<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title></title>
<script src="texture_sample1.js"></script>
<script type="importmap">
{
  "imports": {
    "@babylonjs/core": "https://esm.sh/@babylonjs/core@7.48.3"
  }
}
</script>
<script type="module">
import { Color3, Color4, DirectionalLight, Engine, HemisphericLight, Matrix, MeshBuilder, Quaternion, Scene, StandardMaterial, Texture, Tools, UniversalCamera, Vector3 } from "@babylonjs/core";
import { runRenderLoop, useRightHandedSystem } from "./common.js";

const FRAME_INTERVAL_MS = 1000 / 30/*フレーム*/;

const AMBIENT_LIGHT_COEF = 1.0; // d2js版と見た目が同じになるように係数をかける
const DIRECTIONAL_LIGHT_COEF = 1.0; // d2js版と見た目が同じになるように係数をかける
const SPECULAR_COLOR_COEF = 0.2; // d2js版と見た目が同じになるように係数をかける

// map * colorを白に近づけてテクスチャを残す（Three MeshPhong color.lerpと対応）
const DIFFUSE_BLEND = 0.5;

const canvas3d = document.getElementById("hoge_canvas");
const canvas2d = document.getElementById("fuga_canvas");

const useGouraud = true;
const diffuse = new Color3(1.0, 0.0, 1.0);
const useEmission = false;
const emissionColor = new Color3(1.0, 0.0, 1.0);
const emissionIntensity = 0.75;

const engine = new Engine(canvas3d, true);
engine.setHardwareScalingLevel(1 / window.devicePixelRatio);

const scene = new Scene(engine);
if (useRightHandedSystem) scene.useRightHandedSystem = true;
scene.clearColor = new Color4(0.0, 0.0, 1.0, 1.0);

const camera = new UniversalCamera("cam", new Vector3(0.0, 0.0, 3.0), scene);
camera.minZ = 0.1;
camera.maxZ = 100.0;
camera.fov = Math.PI / 4.0; // 45deg
camera.setTarget(new Vector3(0.0, 0.0, 0.0));

const model = MeshBuilder.CreateBox("box", { size: 2, flat: useGouraud }, scene);
const material = new StandardMaterial("phongLike", scene);
material.diffuseTexture = new Texture(img_src, scene, true, false, Texture.BILINEAR_SAMPLINGMODE); // ミップOFF + 線形（invertY false：Three flipY=true と同系の見え方）
material.diffuseColor = Color3.Lerp(diffuse, Color3.White(), 1.0 - DIFFUSE_BLEND);
material.specularColor = new Color3(0.7 * SPECULAR_COLOR_COEF, 0.7 * SPECULAR_COLOR_COEF, 0.7 * SPECULAR_COLOR_COEF);
material.specularPower = 50.0;
if (useEmission) {
  material.emissiveColor = emissionColor;
  material.emissiveIntensity = emissionIntensity;
} else {
  material.emissiveColor = Color3.Black();
  material.emissiveIntensity = 0.0;
}
model.material = material;

model.position.set(0.0, 0.0, -3.0);
const rotS = useRightHandedSystem ? 1.0 : -1.0;
const rotX = Matrix.RotationX(rotS * Tools.ToRadians(45.0));
const rotY = Matrix.RotationY(rotS * Tools.ToRadians(30.0));
const rotZ = Matrix.RotationZ(rotS * Tools.ToRadians(15.0));
model.rotationQuaternion = Quaternion.FromRotationMatrix(rotX.multiply(rotY.multiply(rotZ))); // Rz*Ry*Rx

const hemi = new HemisphericLight("h", new Vector3(0.0, 1.0, 0.0), scene);
hemi.diffuse = Color3.White();
hemi.groundColor = Color3.White();
hemi.intensity = 0.6 * AMBIENT_LIGHT_COEF;
// Threeでのdir.position.set(0.85, 0.8, 0.75) - BabylonのDirectionalLightは光線の進行方向 = -position
const dirVec = useRightHandedSystem
  ? new Vector3(0.85, 0.8, 0.75).negate().normalize()
  : new Vector3(0.85, -0.8, -0.75).normalize();
const dir = new DirectionalLight("d", dirVec, scene);
dir.intensity = 0.5 * DIRECTIONAL_LIGHT_COEF;

runRenderLoop(engine, FRAME_INTERVAL_MS, () => {
  scene.render();

  // 2Dグラフィック画面の描画
  const context = canvas2d.getContext("2d");
  context.clearRect(0, 0, canvas2d.width, canvas2d.height);
  context.font = "24px 'MS Gothic', sans-serif";
  context.fillStyle = "rgb(255, 0, 255)";
  context.fillText("Hello World !!", 0, 24);
});
</script>
</head>
<body>
<div align="center">
  <div style="position:relative">
    <canvas id="hoge_canvas" style="position:absolute; left:50%; transform:translate(-50%, 0); width:640px; height:480px"></canvas>
    <canvas id="fuga_canvas" style="position:absolute; left:50%; transform:translate(-50%, 0)" width="640" height="480"></canvas>
  </div>
</div>
</body>
</html>
