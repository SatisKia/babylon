<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title></title>
<script type="importmap">
{
  "imports": {
    "@babylonjs/core": "https://esm.sh/@babylonjs/core@7.48.3"
  }
}
</script>
<script type="module">
import { Color3, Color4, Engine, Matrix, MeshBuilder, Quaternion, Scene, Tools, UniversalCamera, Vector3 } from "@babylonjs/core";
import { runRenderLoop, useRightHandedSystem } from "./common.js";

const FRAME_INTERVAL_MS = 1000 / 30/*フレーム*/;

const canvas3d = document.getElementById("hoge_canvas");
const canvas2d = document.getElementById("fuga_canvas");

const engine = new Engine(canvas3d, true);
engine.setHardwareScalingLevel(1 / window.devicePixelRatio);
const scene = new Scene(engine);
if (useRightHandedSystem) scene.useRightHandedSystem = true;
scene.clearColor = new Color4(0.0, 0.0, 1.0, 1.0);

const camera = new UniversalCamera("cam", new Vector3(0.0, 0.0, 0.0), scene);
camera.minZ = 0.1;
camera.maxZ = 100.0;
camera.fov = Math.PI / 4.0; // 45deg
camera.setTarget(new Vector3(0.0, 0.0, useRightHandedSystem ? -1.0 : 1.0));

const points = [
  new Vector3(-1.0, -1.0, -1.0),
  new Vector3( 1.0, -1.0, -1.0),
  new Vector3( 1.0,  1.0, -1.0),
  new Vector3(-1.0,  1.0, -1.0),
  new Vector3(-1.0, -1.0,  1.0),
  new Vector3( 1.0, -1.0,  1.0),
  new Vector3( 1.0,  1.0,  1.0),
  new Vector3(-1.0,  1.0,  1.0),
];
const linePairs = [
  [0, 1], [1, 2], [2, 3], [3, 0],
  [4, 5], [5, 6], [6, 7], [7, 4],
  [0, 4], [1, 5], [2, 6], [3, 7],
];
const lineR = useRightHandedSystem ? 1.0 : -1.0;
const lineRotX = Matrix.RotationX(lineR * Tools.ToRadians(36.0));
const lineRotY = Matrix.RotationY(lineR * Tools.ToRadians(24.0));
const lineRotZ = Matrix.RotationZ(Tools.ToRadians(12.0));
const lineRotMat = lineRotX.multiply(lineRotY.multiply(lineRotZ)); // Rz*Ry*Rx
for (const [a, b] of linePairs) {
  const line = MeshBuilder.CreateLines(
    `ln_${a}_${b}`,
    { points: [points[a], points[b]], updatable: false },
    scene
  );
  line.color = Color3.White();
  line.position.set(0.0, 0.0, useRightHandedSystem ? -6.0 : 6.0);
  line.rotationQuaternion = Quaternion.FromRotationMatrix(lineRotMat);
}

runRenderLoop(engine, FRAME_INTERVAL_MS, () => {
  scene.render();

  // 2Dグラフィック画面の描画
  const context = canvas2d.getContext("2d");
  context.clearRect(0, 0, canvas2d.width, canvas2d.height);
});
</script>
</head>
<body>
<div align="center">
  <div style="position:relative">
    <canvas id="hoge_canvas" style="position:absolute; left:50%; transform:translate(-50%, 0); width:640px; height:480px"></canvas>
    <canvas id="fuga_canvas" style="position:absolute; left:50%; transform:translate(-50%, 0)" width="640" height="480"></canvas>
  </div>
</div>
</body>
</html>
