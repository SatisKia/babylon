<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title></title>
<script src="texture_sample1.js"></script>
<script type="importmap">
{
  "imports": {
    "@babylonjs/core": "https://esm.sh/@babylonjs/core@7.48.3"
  }
}
</script>
<script type="module">
import { Color3, Color4, Engine, Material, Matrix, MeshBuilder, PBRMaterial, Quaternion, Scene, Texture, Tools, UniversalCamera, Vector3 } from "@babylonjs/core";
import { runRenderLoop, useRightHandedSystem } from "./common.js";

const FRAME_INTERVAL_MS = 1000 / 30/*フレーム*/;

const canvas3d = document.getElementById("hoge_canvas");
const canvas2d = document.getElementById("fuga_canvas");

const engine = new Engine(canvas3d, true);
engine.setHardwareScalingLevel(1 / window.devicePixelRatio);

const scene = new Scene(engine);
if (useRightHandedSystem) scene.useRightHandedSystem = true;
scene.clearColor = new Color4(0.0, 0.0, 1.0, 1.0);

const camera = new UniversalCamera("cam", new Vector3(0.0, 0.0, 0.0), scene);
camera.minZ = 0.1;
camera.maxZ = 100.0;
camera.fov = Math.PI / 4.0; // 45deg
camera.setTarget(new Vector3(0.0, 0.0, useRightHandedSystem ? -1.0 : 1.0));

const mesh = MeshBuilder.CreatePlane("plane", { width: 2, height: 2 }, scene);
if (useRightHandedSystem) mesh.flipFaces(false/*法線は反転させない*/); // 右手系＋Threeと同じ捲き順だと裏面扱いになるので反転（インデックスの入れ替えのみ）

const texture = new Texture(img_src, scene, true, true, Texture.TRILINEAR_SAMPLINGMODE);
texture.wrapU = Texture.WRAP_ADDRESSMODE;
texture.wrapV = Texture.WRAP_ADDRESSMODE;
texture.anisotropicFilteringLevel = 1;

const material = new PBRMaterial("m", scene);
material.unlit = true;
material.metallic = 0;
material.roughness = 1;
material.albedoTexture = texture;
material.albedoColor = Color3.White();
material.transparencyMode = Material.MATERIAL_ALPHABLEND;
material.useAlphaFromAlbedoTexture = true;
mesh.material = material;

mesh.position.set(0.0, 0.0, useRightHandedSystem ? -6.0 : 6.0);
const rotS = useRightHandedSystem ? 1.0 : -1.0;
const rotX = Matrix.RotationX(rotS * Tools.ToRadians(45.0));
const rotY = Matrix.RotationY(rotS * Tools.ToRadians(30.0));
const rotZ = Matrix.RotationZ(Tools.ToRadians(15.0));
mesh.rotationQuaternion = Quaternion.FromRotationMatrix(rotX.multiply(rotY.multiply(rotZ))); // Rz*Ry*Rx

let scroll = 0.0;
let old_time = performance.now();

runRenderLoop(engine, FRAME_INTERVAL_MS, (now) => {
  const time = now - old_time;
  old_time = now;

  scroll -= 0.01;
  texture.uOffset = scroll;
  texture.vOffset = -scroll;

  scene.render();

  // 2Dグラフィック画面の描画
  const context = canvas2d.getContext("2d");
  context.clearRect(0, 0, canvas2d.width, canvas2d.height);
  context.font = "24px 'MS Gothic', sans-serif";
  context.fillStyle = "rgb(255, 0, 255)";
  context.fillText("fps " + (time > 0.0 ? (1000.0 / time).toFixed(1) : "0"), 0, 24);
});
</script>
</head>
<body>
<div align="center">
  <div style="position:relative">
    <canvas id="hoge_canvas" style="position:absolute; left:50%; transform:translate(-50%, 0); width:640px; height:480px"></canvas>
    <canvas id="fuga_canvas" style="position:absolute; left:50%; transform:translate(-50%, 0)" width="640" height="480"></canvas>
  </div>
</div>
</body>
</html>
