<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title></title>
<script src="texture_witch.js"></script>
<script src="texture_mesh.js"></script>
<script type="importmap">
{
  "imports": {
    "@babylonjs/core": "./node_modules/@babylonjs/core/index.js",
    "@babylonjs/core/": "./node_modules/@babylonjs/core/",
    "@babylonjs/loaders": "./node_modules/@babylonjs/loaders/index.js",
    "@babylonjs/loaders/": "./node_modules/@babylonjs/loaders/"
  }
}
</script>
<script type="module">
import { Color3, Color4, DirectionalLight, Effect, Engine, HemisphericLight, Matrix, MeshBuilder, MirrorTexture, PBRMaterial, Plane, Quaternion, Scene, ShaderMaterial, ShadowGenerator, Texture, Tools, TransformNode, UniversalCamera, Vector3 } from "@babylonjs/core";
import { applyDiffuse, applyDiffuseDataUrlTextures, applyKaBlendToDiffuse, applySmoothShading, convertMaterialsToLambert, loadObjMtl } from "./loadObjMtl.js";
import { runRenderLoop, useRightHandedSystem } from "./common.js";

const MODEL_DIR = "./model/";

const AMBIENT_LIGHT_COEF = 1.0;
const DIRECTIONAL_LIGHT_COEF = 1.0;

const GROUND_MODEL_SCALE = 0.033;
const GROUND_PLANE_SIZE = 200 * GROUND_MODEL_SCALE;
const WATER_METALNESS = 0.05;
const WATER_ROUGHNESS = 0.15;

let dispMesh = false;
let meshObjRoot = null;
let waveType = 0;

// Threeの15glslのWaterRippleReflectorShaderに相当（フラグメントで反射UVゆらぎ）
Effect.ShadersStore["waterRippleReflectVertexShader"] = `
  precision highp float;

  attribute vec3 position;

  uniform mat4 worldViewProjection;
  uniform mat4 world;
  uniform mat4 view;
  uniform mat4 reflectionMatrix;

  varying vec4 vReflectCoord;

  void main(void) {
    vec4 worldPos = world * vec4(position, 1.0);
    vReflectCoord = reflectionMatrix * (view * worldPos);
    gl_Position = worldViewProjection * vec4(position, 1.0);
  }
`;
Effect.ShadersStore["waterRippleReflectFragmentShader"] = `
  precision highp float;

  uniform vec3 waterTint;
  uniform sampler2D mirrorSampler;
  uniform int uWaveType;
  uniform float uFrequencyX, uFrequencyY;
  uniform float uAmplitudeX, uAmplitudeY;
  uniform float uSpeedX, uSpeedY;
  uniform float uElapse;
  uniform float uNoiseScale;
  uniform float uNoiseTimeScale;
  uniform float uNoiseStrength;
  uniform float uNoiseAmplitude;

  varying vec4 vReflectCoord;

  float rand(vec2 st) {
    return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123);
  }

  float smoothNoise(vec2 st) {
    vec2 i = floor(st);
    vec2 f = fract(st);
    float a = rand(i);
    float b = rand(i + vec2(1.0, 0.0));
    float c = rand(i + vec2(0.0, 1.0));
    float d = rand(i + vec2(1.0, 1.0));
    vec2 u = f * f * (3.0 - 2.0 * f);
    return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
  }

  float fbmNoise(vec2 st, float scale) {
    float value = 0.0;
    float amplitude = 1.0;
    float frequency = 1.0;
    for (int i = 0; i < 4; i++) {
      value += amplitude * smoothNoise(st * frequency * scale);
      amplitude *= 0.5;
      frequency *= 2.0;
    }
    return value;
  }

  float waveOffset(float x, float y, float freq, float amp, float speed, float time, float dx, float dy) {
    if (uWaveType == 1) {
      return sin(x * dx * freq + y * dy * freq + time * speed) * amp;
    }
    vec2 noiseCoord = vec2(x * dx * uNoiseScale, y * dy * uNoiseScale + time * uNoiseTimeScale);
    float noiseValue = fbmNoise(noiseCoord, 1.0) * uNoiseStrength;
    float w = sin(x * dx * freq + y * dy * freq + time * speed + noiseValue * 3.14159);
    return w * amp * (1.0 + noiseValue * uNoiseAmplitude);
  }

  float blendOverlayCh(float base, float blend) {
    return (base < 0.5 ? (2.0 * base * blend) : (1.0 - 2.0 * (1.0 - base) * (1.0 - blend)));
  }

  vec3 blendOverlayRgb(vec3 base, vec3 blend) {
    return vec3(
      blendOverlayCh(base.r, blend.r),
      blendOverlayCh(base.g, blend.g),
      blendOverlayCh(base.b, blend.b)
    );
  }

  void main(void) {
    float offsetX = 0.0;
    if (uFrequencyX != 0.0) {
      if (uWaveType == 0) {
        offsetX = sin(gl_FragCoord.x * uFrequencyX + uElapse * uSpeedX) * uAmplitudeX;
      } else {
        offsetX += waveOffset(gl_FragCoord.x, gl_FragCoord.y, uFrequencyX, uAmplitudeX, uSpeedX, uElapse, 1.0, 0.0);
        offsetX += waveOffset(gl_FragCoord.x, gl_FragCoord.y, uFrequencyX * 0.7, uAmplitudeX * 0.5, uSpeedX * 0.8, uElapse, 0.7, 0.7);
        offsetX += waveOffset(gl_FragCoord.x, gl_FragCoord.y, uFrequencyX * 1.5, uAmplitudeX * 0.3, uSpeedX * 1.2, uElapse, 0.3, 0.9);
      }
    }
    float offsetY = 0.0;
    if (uFrequencyY != 0.0) {
      if (uWaveType == 0) {
        offsetY = cos(gl_FragCoord.y * uFrequencyY + uElapse * uSpeedY) * uAmplitudeY;
      } else {
        offsetY += waveOffset(gl_FragCoord.x, gl_FragCoord.y, uFrequencyY, uAmplitudeY, uSpeedY, uElapse, 0.0, 1.0);
        offsetY += waveOffset(gl_FragCoord.x, gl_FragCoord.y, uFrequencyY * 0.7, uAmplitudeY * 0.5, uSpeedY * 0.8, uElapse, 0.7, 0.7);
        offsetY += waveOffset(gl_FragCoord.x, gl_FragCoord.y, uFrequencyY * 1.5, uAmplitudeY * 0.3, uSpeedY * 1.2, uElapse, 0.3, 0.9);
      }
    }

    float denom = vReflectCoord.z;
    if (abs(denom) < 1e-6) {
      gl_FragColor = vec4(waterTint, 1.0);
      return;
    }
    vec2 uv = vReflectCoord.xy / denom;
    uv.y = 1.0 - uv.y;
    uv.x += offsetX;
    uv.y += offsetY;

    vec4 base = texture2D(mirrorSampler, uv);
    gl_FragColor = vec4(blendOverlayRgb(base.rgb, waterTint), 1.0);
  }
`;

let image_loaded = false;

const canvas3d = document.getElementById("hoge_canvas");
const canvas2d = document.getElementById("fuga_canvas");

const engine = new Engine(canvas3d, true);
engine.setHardwareScalingLevel(1 / window.devicePixelRatio);

const scene = new Scene(engine);
if (useRightHandedSystem) scene.useRightHandedSystem = true;
scene.clearColor = new Color4(0.0, 0.0, 1.0, 1.0);

const lookY = 0.0;
const camera = new UniversalCamera("cam", new Vector3(0.0, lookY, 7.5), scene);
camera.minZ = 0.1;
camera.maxZ = 100.0;
camera.fov = Math.PI / 4.0;
camera.setTarget(new Vector3(0.0, lookY, 0.0));

const scenePivot = new TransformNode("pivot", scene);
scenePivot.position.set(0.0, lookY, 0.0);

let lightX = useRightHandedSystem ? -3.0 : 3.0;
let lightY = 7.5;
let lightZ = 3.5;
const LIGHT_STEP = 0.1;

let rotateX = useRightHandedSystem ? 25.0 : -25.0;
let rotateY = 25.0;

const lightHelper = new TransformNode("lightHelper", scene);
lightHelper.parent = scenePivot;

const mirror = new MirrorTexture("mirror", 1024, scene, true, undefined, Texture.BILINEAR_SAMPLINGMODE, true);
mirror.clearColor = new Color4(0.0, 0.0, 1.0, 1.0);
mirror.level = 1.5;

// 平坦な反射面（ゆらぎはシェーダ内のみ。Three.js 15glslと同系）
const reflectPlane = MeshBuilder.CreateGround(
  "rippleReflect",
  { width: GROUND_PLANE_SIZE, height: GROUND_PLANE_SIZE, subdivisions: 1 },
  scene
);
reflectPlane.position.y = 0.01;
reflectPlane.setParent(scenePivot);

const rippleMat = new ShaderMaterial(
  "rippleReflectMat",
  scene,
  { vertex: "waterRippleReflect", fragment: "waterRippleReflect" },
  {
    attributes: ["position", "normal", "uv"],
    uniforms: [
      "world",
      "worldViewProjection",
      "view",
      "reflectionMatrix",
      "waterTint",
      "uWaveType",
      "uFrequencyX",
      "uFrequencyY",
      "uAmplitudeX",
      "uAmplitudeY",
      "uSpeedX",
      "uSpeedY",
      "uElapse",
      "uNoiseScale",
      "uNoiseTimeScale",
      "uNoiseStrength",
      "uNoiseAmplitude",
    ],
    samplers: ["mirrorSampler"],
    needAlphaBlending: false,
    needAlphaTesting: false,
  }
);
rippleMat.backFaceCulling = true;
rippleMat.setTexture("mirrorSampler", mirror);
rippleMat.setColor3("waterTint", new Color3(127 / 255, 127 / 255, 127 / 255));
rippleMat.setInt("uWaveType", 0);
rippleMat.setFloat("uFrequencyX", 0.1);
rippleMat.setFloat("uFrequencyY", 0.1);
rippleMat.setFloat("uAmplitudeX", 0.001 * 20);
rippleMat.setFloat("uAmplitudeY", 0.001);
rippleMat.setFloat("uSpeedX", 0.5);
rippleMat.setFloat("uSpeedY", 0.5);
rippleMat.setFloat("uElapse", 0.0);
rippleMat.setFloat("uNoiseScale", 0.02);
rippleMat.setFloat("uNoiseTimeScale", 0.1);
rippleMat.setFloat("uNoiseStrength", 0.2);
rippleMat.setFloat("uNoiseAmplitude", 0.5);
reflectPlane.material = rippleMat;

// 半透明の水面オーバーレイ（Threeのwater MeshStandardMaterialに相当）
const water = MeshBuilder.CreateGround(
  "waterTint",
  { width: GROUND_PLANE_SIZE, height: GROUND_PLANE_SIZE, subdivisions: 1 },
  scene
);
water.position.y = 0.02;
water.setParent(scenePivot);
water.renderingGroupId = 0;

const waterMaterial = new PBRMaterial("waterTintMat", scene);
waterMaterial.metallic = WATER_METALNESS;
waterMaterial.roughness = WATER_ROUGHNESS;
waterMaterial.albedoColor = new Color3(128 / 255, 128 / 255, 128 / 255);
waterMaterial.alpha = 0.55;
waterMaterial.transparencyMode = 2;
waterMaterial.backFaceCulling = false;
waterMaterial.reflectionTexture = mirror;
waterMaterial.reflectionTexture.level = 1.45;
water.material = waterMaterial;
water.receiveShadows = true;

function refreshMirrorRenderList() {
  mirror.renderList.length = 0;
  const skip = new Set([reflectPlane, water]);
  for (const m of scene.meshes) {
    if (!m || skip.has(m)) continue;
    if (m.getClassName?.() !== "Mesh") continue;
    if (!m.getTotalVertices || m.getTotalVertices() === 0) continue;
    mirror.renderList.push(m);
  }
}

const hemi = new HemisphericLight("h", new Vector3(0.0, 1.0, 0.0), scene);
hemi.diffuse = Color3.White();
hemi.groundColor = Color3.White();
hemi.intensity = 0.5 * AMBIENT_LIGHT_COEF;

const dir = new DirectionalLight("dir", new Vector3(0.0, -1.0, 0.0), scene);
dir.intensity = 1.0 * DIRECTIONAL_LIGHT_COEF;
dir.shadowMinZ = 0.5;
dir.shadowMaxZ = 40.0;
const shadowExtent = 12.0 * (GROUND_PLANE_SIZE / 20.0);
dir.shadowFrustumSize = Math.max(shadowExtent, 8);

const shadowGen = new ShadowGenerator(2048, dir);
shadowGen.filter = ShadowGenerator.FILTER_PCF;
shadowGen.filteringQuality = ShadowGenerator.QUALITY_HIGH;
shadowGen.bias = 0.0008;

async function init() {
  const specs = [
    { name: "witch", scale: 0.015, pos: [0.0, 0.05, 0.0], diffuse: 0.8 },
    { name: "cat", scale: 0.005, pos: [useRightHandedSystem ? -1.5 : 1.5, 0.4, 0.5] },
    { name: "swan", scale: 0.005, pos: [useRightHandedSystem ? 2.0 : -2.0, 2.0, 0.5], kaBlend: 0.35 },
    { name: "mesh", scale: GROUND_MODEL_SCALE, pos: [0.0, 1.2, -1.5] },
  ];
  try {
    for (const s of specs) {
      const root = await loadObjMtl(scene, MODEL_DIR, s.name);
      if (s.name === "witch") {
        applyDiffuseDataUrlTextures(scene, root, [
          { materialName: "kao", dataUrl: img_src[0] },
          { materialName: "body", dataUrl: img_src[1] },
          { materialName: "fire", dataUrl: img_src[2] },
        ]);
      }
      if (s.name === "mesh") {
        applyDiffuseDataUrlTextures(scene, root, [
          { materialName: "mat1", dataUrl: img_src_mesh },
        ]);
      }
      convertMaterialsToLambert(root);
      if (s.diffuse !== undefined) applyDiffuse(root, s.diffuse, s.diffuse, s.diffuse);
      if (s.kaBlend !== undefined) applyKaBlendToDiffuse(root, s.kaBlend);
      applySmoothShading(root);
      root.scaling.copyFromFloats(s.scale, s.scale, s.scale);
      root.position.set(s.pos[0], s.pos[1], s.pos[2]);
      const castShadow = !s.ground;
      const meshes = root.getChildMeshes ? root.getChildMeshes(true) : [];
      if (root.getClassName && root.getClassName() === "Mesh") meshes.push(root);
      for (const mesh of meshes) {
        if (castShadow) shadowGen.addShadowCaster(mesh);
        mesh.receiveShadows = true;
      }
      root.setParent(scenePivot);
      if (s.name === "mesh") meshObjRoot = root;
    }
    if (meshObjRoot) meshObjRoot.setEnabled(dispMesh);
    refreshMirrorRenderList();
    image_loaded = true;
  } catch (e) {
    console.error(e);
  }
}
init();

const keys = new Set();
window.addEventListener("keydown", (e) => keys.add(e.code));
window.addEventListener("keyup", (e) => keys.delete(e.code));

let elapse = 0;

runRenderLoop(engine, () => (image_loaded ? 1000 / 30/*フレーム*/ : 100), () => {
  if (keys.has("ArrowUp")) lightY += LIGHT_STEP;
  if (keys.has("ArrowDown")) lightY -= LIGHT_STEP;
  if (keys.has("ArrowLeft")) lightX -= useRightHandedSystem ? LIGHT_STEP : -LIGHT_STEP;
  if (keys.has("ArrowRight")) lightX += useRightHandedSystem ? LIGHT_STEP : -LIGHT_STEP;
  if (keys.has("KeyZ")) lightZ += LIGHT_STEP;
  if (keys.has("KeyX")) lightZ -= LIGHT_STEP;

  elapse += 1.0;
  rippleMat.setFloat("uElapse", elapse);
  rippleMat.setInt("uWaveType", waveType);

  if (image_loaded) {
    const r = useRightHandedSystem ? 1.0 : -1.0;
    const rotX = Matrix.RotationX(r * Tools.ToRadians(rotateX));
    const rotY = Matrix.RotationY(r * Tools.ToRadians(rotateY));
    const rotZ = Matrix.RotationZ(0.0);
    scenePivot.rotationQuaternion = Quaternion.FromRotationMatrix(rotZ.multiply(rotY.multiply(rotX)));
    scenePivot.computeWorldMatrix(true);
  }

  lightHelper.position.set(lightX, lightY - lookY, lightZ);
  scenePivot.computeWorldMatrix(true);
  lightHelper.computeWorldMatrix(true);
  const transLight = lightHelper.getAbsolutePosition();
  dir.position.copyFrom(transLight);
  const tgt = new Vector3(0.0, lookY, 0.0);
  const toT = tgt.subtract(transLight);
  if (toT.lengthSquared() > 1e-10) {
    toT.normalize();
    dir.direction.copyFrom(toT);
  }

  reflectPlane.computeWorldMatrix(true);
  {
    const wm = reflectPlane.getWorldMatrix();
    const worldPos = Vector3.TransformCoordinates(Vector3.Zero(), wm);
    const worldNor = Vector3.TransformNormal(new Vector3(0.0, 1.0, 0.0), wm);
    worldNor.normalize();
    worldNor.scaleInPlace(-1);
    mirror.mirrorPlane = Plane.FromPositionAndNormal(worldPos, worldNor);
  }
  refreshMirrorRenderList();
  camera.setTarget(new Vector3(0.0, lookY, 0.0));
  // getReflectionTextureMatrixはscene.getProjectionMatrix()（PROJECTION_MODE）を参照する。
  // render前は未初期化のため、カメラの投影を反映してから更新する。
  scene.updateTransformMatrix(true);
  rippleMat.setMatrix("view", camera.getViewMatrix());
  rippleMat.setMatrix("reflectionMatrix", mirror.getReflectionTextureMatrix());

  scene.render();

  // 2Dグラフィック画面の描画
  const context = canvas2d.getContext("2d");
  context.clearRect(0, 0, canvas2d.width, canvas2d.height);
  context.font = "24px 'MS Gothic', sans-serif";
  context.fillStyle = "rgb(255, 0, 255)";
  context.fillText("waveType " + waveType, 0, 24);
  context.fillText("rotateX " + rotateX.toFixed(1), 0, 48);
  context.fillText("rotateY " + rotateY.toFixed(1), 0, 72);
  context.fillText("lightX " + lightX.toFixed(1), 0, 96);
  context.fillText("lightY " + lightY.toFixed(1), 0, 120);
  context.fillText("lightZ " + lightZ.toFixed(1), 0, 144);
});

let mouseDown = false;
let mouseX = 0;
let mouseY = 0;
canvas3d.addEventListener("pointerdown", (e) => {
  mouseDown = true;
  mouseX = e.clientX;
  mouseY = e.clientY;
});
window.addEventListener("pointerup", () => {
  mouseDown = false;
});
window.addEventListener("pointermove", (e) => {
  if (!mouseDown) return;
  const r = useRightHandedSystem ? 1.0 : -1.0;
  rotateX += r * (e.clientY - mouseY) / 2.0;
  rotateY += (e.clientX - mouseX) / 2.0;
  mouseX = e.clientX;
  mouseY = e.clientY;
});
window.addEventListener("keydown", (e) => {
  if (e.code === "Digit1" || e.code === "Numpad1") waveType = 0;
  else if (e.code === "Digit2" || e.code === "Numpad2") waveType = 1;
  else if (e.code === "Digit3" || e.code === "Numpad3") waveType = 2;
});
</script>
</head>
<body>
<div align="center">
  <div style="position:relative">
    <canvas id="hoge_canvas" style="position:absolute; left:50%; transform:translate(-50%, 0); width:640px; height:480px"></canvas>
    <canvas id="fuga_canvas" style="position:absolute; left:50%; transform:translate(-50%, 0); pointer-events:none" width="640" height="480"></canvas>
  </div>
</div>
</body>
</html>
