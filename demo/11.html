<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title></title>
<script src="texture_sample2.js"></script>
<script type="importmap">
{
  "imports": {
    "@babylonjs/core": "https://esm.sh/@babylonjs/core@7.48.3"
  }
}
</script>
<script type="module">
import { Color4, Engine, Matrix, Scene, Sprite, SpriteManager, Texture, UniversalCamera, Vector3, Viewport } from "@babylonjs/core";
import { runRenderLoop, useRightHandedSystem } from "./common.js";

const FRAME_INTERVAL_MS = 1000 / 30/*フレーム*/;

// Vector3.Project用
const _tmpWorld = new Vector3();
const _viewProjection = new Matrix();

const canvas3d = document.getElementById("hoge_canvas");
const canvas2d = document.getElementById("fuga_canvas");

const engine = new Engine(canvas3d, true, {
  preserveDrawingBuffer: true, // 描画後もバッファ保持（toDataURLを行う場合はtrue）
});
engine.setHardwareScalingLevel(1 / window.devicePixelRatio);

const scene = new Scene(engine);
if (useRightHandedSystem) scene.useRightHandedSystem = true;
scene.clearColor = new Color4(0.0, 0.0, 1.0, 1.0);

const camera_x = 0.0;
const camera_y = 6.0;
const camera_z = 6.0;
const camera = new UniversalCamera("cam", new Vector3(camera_x, camera_y, camera_z), scene);
camera.minZ = 0.1;
camera.maxZ = 100.0;
camera.fov = Math.PI / 4.0; // 45deg
camera.aspectRatio = canvas3d.width / canvas3d.height;
camera.setTarget(new Vector3(0.0, 0.0, 0.0));

const mgr = new SpriteManager(
  "sprites",
  img_src,
  16,
  { width: 256, height: 256 },
  scene,
  0.01,
  Texture.NEAREST_SAMPLINGMODE
);
mgr.fogEnabled = false;

const pos = [
  [ 0.0, 0.5,  2.0],
  [-1.5, 0.5,  0.0],
  [ 1.5, 0.5,  0.0],
  [-3.0, 0.5, -2.0],
  [ 0.0, 0.5, -2.0],
  [ 3.0, 0.5, -2.0],
];
const worldPts = pos.map((p) => new Vector3(p[0], p[1], p[2]));
for (const [x, y, z] of pos) {
  const s = new Sprite("sp", mgr);
  s.position = new Vector3(x, y, z);
  s.size = 2.0;
  if (useRightHandedSystem) s.invertU = true;
}

let angle = 0.0;
let hide2DFlag = false;
let screenshotFlag = false;

const keys = new Set();
window.addEventListener("keydown", (e) => {
  keys.add(e.code);
  if (e.code === "KeyS") screenshotFlag = true;
});
window.addEventListener("keyup", (e) => keys.delete(e.code));

runRenderLoop(engine, FRAME_INTERVAL_MS, () => {
  hide2DFlag = keys.has("ShiftLeft") || keys.has("ShiftRight");

  angle += useRightHandedSystem ? 0.01 : -0.01;
  const rotX = camera_x * Math.cos(angle) - camera_z * Math.sin(angle);
  const rotZ = camera_z * Math.cos(angle) + camera_x * Math.sin(angle);
  camera.position.set(rotX, camera_y, rotZ);
  camera.setTarget(new Vector3(0.0, 0.0, 0.0));

  scene.render();

  // 2Dグラフィック画面の描画
  const context = canvas2d.getContext("2d");
  context.clearRect(0, 0, canvas2d.width, canvas2d.height);
  context.font = "24px 'MS Gothic', sans-serif";
  context.fillStyle = "rgb(255, 0, 255)";
  context.fillText("Screenshot : [S]", 0, 456);
  context.fillText("Screenshot (Hide 2D) : [Shift]+[S]", 0, 480);
  if (!hide2DFlag) {
    context.fillStyle = "rgb(0, 255, 255)";
    // Projectはengineのレンダーバッファ座標。setHardwareScalingLevel等でgetRenderWidth()がcanvas.widthと違うと2Dだけ画面外になる
    const rw = engine.getRenderWidth();
    const rh = engine.getRenderHeight();
    worldPts.forEach((wp) => {
      _tmpWorld.set(wp.x, wp.y, wp.z);
      // scene.getTransformMatrix()は初回、setTransformMatrixがupdateFlagのundefined一致でスキップされ、Matrix.Zero()のままになり得る → ProjectがNaNになる
      let rwP = engine.getRenderWidth();
      let rhP = engine.getRenderHeight();
      if (rwP <= 0 || rhP <= 0) {
        const c = engine.getRenderingCanvas();
        rwP = c ? c.width : 1;
        rhP = c ? c.height : 1;
      }
      const vp = new Viewport(0, 0, rwP, rhP);
      // esm.shの@babylonjs/coreでは静的Matrix.Multiplyが無いことがある → view.multiplyToRef(projection, out)でview×projection
      camera.getViewMatrix().multiplyToRef(camera.getProjectionMatrix(), _viewProjection);
      const pProj = Vector3.Project(_tmpWorld, Matrix.Identity(), _viewProjection, vp);
      const sx = (pProj.x / rw) * canvas2d.width;
      const sy = (pProj.y / rh) * canvas2d.height;
      const dist = Vector3.Distance(camera.position, wp);
      const wld = Vector3.Unproject(
        new Vector3(pProj.x, pProj.y, pProj.z), // Vector3.Projectは既にビューポート上のピクセル座標を返す。NDCに戻すと二重変換で画面外に出る。
        rwP,
        rhP,
        Matrix.Identity(),
        camera.getViewMatrix(),
        camera.getProjectionMatrix()
      );
      context.fillText(String(Math.round(dist * 100.0) / 100.0), sx, sy);
      context.fillText(
        [wld.x, wld.y, wld.z].map((n) => Math.round(n * 100.0) / 100.0).join(" "),
        sx,
        sy + 30.0
      );
    });
  }

  if (screenshotFlag) {
    screenshotFlag = false;
    const dataUrl = canvas3d.toDataURL("image/png");
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = "screenshot.png";
    a.click();
  }
});
</script>
</head>
<body>
<div align="center">
  <div style="position:relative">
    <canvas id="hoge_canvas" style="position:absolute; left:50%; transform:translate(-50%, 0); z-index:0; width:640px; height:480px"></canvas>
    <canvas id="fuga_canvas" style="position:absolute; left:50%; transform:translate(-50%, 0); z-index:1" width="640" height="480"></canvas>
  </div>
</div>
</body>
</html>
